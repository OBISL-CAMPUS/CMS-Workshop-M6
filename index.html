<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBISL Campus - Module 6 Interactive Practicum Dashboard</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts: Inter for English, Abhaya Libre & Google Fonts for beautiful Sinhala -->
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & Babel CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>

    <!-- Tailwind Configuration for custom brand themes -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            900: '#064e3b',
                        },
                        tech: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        sinhala: ['Abhaya Libre', 'Iskoola Pota', 'serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        /* Hide scrollbars for side navigation while retaining scrollability */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism custom design tokens */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Ambient glow animation */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1) translate(0px, 0px); opacity: 0.15; }
            50% { transform: scale(1.1) translate(20px, -20px); opacity: 0.25; }
        }
        .animate-pulse-slow-1 {
            animation: pulse-slow 8s infinite alternate ease-in-out;
        }
        .animate-pulse-slow-2 {
            animation: pulse-slow 12s infinite alternate-reverse ease-in-out;
        }

        /* Print Layout Adjustments */
        @media print {
            body {
                background: white !important;
                color: black !important;
                font-size: 12pt;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .glass-panel {
                background: white !important;
                color: black !important;
                border: 1px solid #cbd5e1 !important;
                box-shadow: none !important;
                backdrop-filter: none !important;
            }
            .text-slate-400, .text-slate-500, .text-slate-300 {
                color: #334155 !important;
            }
            .text-emerald-400, .text-brand-400 {
                color: #047857 !important;
            }
            .text-blue-400, .text-tech-400 {
                color: #1d4ed8 !important;
            }
            .active-tab-container {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen overflow-x-hidden relative">

    <!-- Non-interactive ambient glowing orbs -->
    <div class="fixed top-12 left-1/4 w-96 h-96 bg-brand-600/20 rounded-full blur-[120px] pointer-events-none animate-pulse-slow-1 z-0"></div>
    <div class="fixed bottom-12 right-1/4 w-[450px] h-[450px] bg-tech-600/15 rounded-full blur-[140px] pointer-events-none animate-pulse-slow-2 z-0"></div>

    <!-- React App Root Container -->
    <div id="root" class="relative z-10 min-h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Inline SVG Icons to guarantee absolute standalone rendering
        const IconCase = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
        );
        const IconDeepDive = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
        );
        const IconScenario = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
        );
        const IconLab = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
        );
        const IconSim1 = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>
        );
        const IconSim2 = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
        );
        const IconSim3 = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H16" /></svg>
        );
        const IconBreakout = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z" /></svg>
        );
        const IconPrint = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
        );

        // Core App Component
        function App() {
            const [activeTab, setActiveTab] = useState(0);
            const [langMode, setLangMode] = useState('en'); // Strictly 'en' or 'si'

            // Shared Bilingual Renderer Component inside the App scope
            // Switches completely based on 'langMode' for 100% pure single-language experience.
            const Bilingual = ({ en, si, className = "" }) => {
                if (langMode === 'en') {
                    return <span className={`${className} font-sans`}>{en}</span>;
                }
                return <span className={`${className} font-sinhala leading-relaxed`}>{si}</span>;
            };

            // Custom dynamic states for Calculator Labs
            const [calcEd, setCalcEd] = useState({ p1: 1000, p2: 1200, q1: 500, q2: 380 });
            const [calcBundle, setCalcBundle] = useState({ pA: 3500, pB: 1500, discount: 20, useFractional: true });

            // Simulation 1 State
            const [sim1Industry, setSim1Industry] = useState('tea');
            const [sim1Layers, setSim1Layers] = useState({ core: true, actual: false, augmented: false });
            const [sim1Processing, setSim1Processing] = useState(false);
            const [sim1Output, setSim1Output] = useState(null);

            // Simulation 2 State
            const [sim2Strategy, setSim2Strategy] = useState('skimming');

            // Simulation 3 State
            const [sim3Workflow, setSim3Workflow] = useState('linear');

            // Breakout accordion states
            const [breakoutActive, setBreakoutActive] = useState(null);
            const [breakoutCompleted, setBreakoutCompleted] = useState({});

            // Trigger System Simulation 1 deployment
            const handleSim1Deploy = () => {
                setSim1Processing(true);
                setTimeout(() => {
                    setSim1Processing(false);
                    const activatedCount = Object.values(sim1Layers).filter(Boolean).length;
                    let margin = 5;
                    let elasticity = 2.5;
                    let positioningEn = "Commodity Trap";
                    let positioningSi = "භාණ්ඩමය උගුල (Commodity Trap)";
                    let retention = "15%";

                    if (activatedCount === 1) {
                        margin = 5;
                        elasticity = 2.5;
                        positioningEn = "Commodity Trap";
                        positioningSi = "භාණ්ඩමය උගුල (Commodity Trap)";
                        retention = "10% - 15%";
                    } else if (activatedCount === 2) {
                        margin = 25;
                        elasticity = 1.4;
                        positioningEn = "Market Challenger";
                        positioningSi = "වෙළඳපල අභියෝගකරු (Market Challenger)";
                        retention = "40% - 50%";
                    } else if (activatedCount === 3) {
                        margin = 55;
                        elasticity = 0.45;
                        positioningEn = "Uncontested Premium Value Leader";
                        positioningSi = "ප්‍රිමියම් අගය නායකයා (Premium Value Leader)";
                        retention = "85% - 92%";
                    }

                    setSim1Output({ margin, elasticity, positioningEn, positioningSi, retention });
                }, 1200);
            };

            // Reset Sim 1 when change industry
            useEffect(() => {
                setSim1Output(null);
                setSim1Layers({ core: true, actual: false, augmented: false });
            }, [sim1Industry]);

            // Formulate standard calculations for Price Elasticity
            const calculateElasticity = () => {
                const { p1, p2, q1, q2 } = calcEd;
                const pChange = p1 !== 0 ? ((p2 - p1) / p1) * 100 : 0;
                const qChange = q1 !== 0 ? ((q2 - q1) / q1) * 100 : 0;
                const elasticity = pChange !== 0 ? qChange / pChange : 0;
                const absEd = Math.abs(elasticity);

                const originalRev = p1 * q1;
                const newRev = p2 * q2;
                const revChange = newRev - originalRev;

                return {
                    pChange: pChange.toFixed(1),
                    qChange: qChange.toFixed(1),
                    ed: elasticity.toFixed(2),
                    absEd: absEd.toFixed(2),
                    originalRev: originalRev.toLocaleString(),
                    newRev: newRev.toLocaleString(),
                    revChange: revChange,
                    isElastic: absEd > 1,
                    isUnitary: absEd === 1
                };
            };

            const edResults = calculateElasticity();

            // Formulate calculations for Bundle Pricing Simulator
            const calculateBundlePricing = () => {
                const { pA, pB, discount, useFractional } = calcBundle;
                const standardSum = pA + pB;
                const discountedRaw = standardSum * (1 - discount / 100);
                
                let finalPrice = discountedRaw;
                let originalLeftDigit = Math.floor(discountedRaw).toString()[0];
                let perceivedLeftDigit = originalLeftDigit;

                if (useFractional) {
                    const roundedHund = Math.round(discountedRaw / 100) * 100;
                    finalPrice = roundedHund - 1;
                    perceivedLeftDigit = Math.floor(finalPrice).toString()[0];
                }

                const buyerSavings = standardSum - finalPrice;
                const realDiscountPct = ((buyerSavings / standardSum) * 100).toFixed(1);

                return {
                    standardSum: standardSum.toLocaleString(),
                    discountedRaw: Math.round(discountedRaw).toLocaleString(),
                    finalPrice: Math.round(finalPrice).toLocaleString(),
                    buyerSavings: Math.round(buyerSavings).toLocaleString(),
                    realDiscountPct,
                    originalLeftDigit,
                    perceivedLeftDigit,
                    hasLeftDigitShift: originalLeftDigit !== perceivedLeftDigit && useFractional
                };
            };

            const bundleResults = calculateBundlePricing();

            const tabMeta = [
                { id: 0, label_en: "Case Insight", label_si: "සිද්ධි විග්‍රහය", icon: <IconCase /> },
                { id: 1, label_en: "Deep Dive Analysis", label_si: "න්‍යායාත්මක විශ්ලේෂණය", icon: <IconDeepDive /> },
                { id: 2, label_en: "Scenario Suite", label_si: "ප්‍රායෝගික අවස්ථා", icon: <IconScenario /> },
                { id: 3, label_en: "Diagnostic Lab", label_si: "පරීක්ෂණාගාරය", icon: <IconLab /> },
                { id: 4, label_en: "Layer Architect", label_si: "නිෂ්පාදන ස්ථර සැකසුම", icon: <IconSim1 /> },
                { id: 5, label_en: "Strategic Cascade", label_si: "උපායමාර්ගික ප්‍රවාහය", icon: <IconSim2 /> },
                { id: 6, label_en: "Workflow Sim", label_si: "කාර්ය ප්‍රවාහ සංසන්දනය", icon: <IconSim3 /> },
                { id: 7, label_en: "Breakout Rooms", label_si: "සාකච්ඡා කාමර", icon: <IconBreakout /> }
            ];

            return (
                <div className="flex flex-1 flex-col md:flex-row relative">
                    
                    {/* FIXED SIDE NAVIGATION */}
                    <nav className="no-print w-full md:w-64 glass-panel border-r border-slate-800/80 md:sticky md:top-0 md:h-screen flex flex-col justify-between shrink-0 z-40 transition-all duration-300">
                        <div>
                            {/* Brand Header */}
                            <div className="p-6 border-b border-slate-800/60 flex items-center justify-between">
                                <div className="flex items-center space-x-3">
                                    <div className="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center font-extrabold text-slate-950 shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                                        O
                                    </div>
                                    <div>
                                        <h1 className="font-bold text-sm tracking-wide text-white">OBISL CAMPUS</h1>
                                        <p className="text-[10px] text-emerald-400 font-semibold tracking-wider uppercase">
                                            <Bilingual en="Practicum Hub" si="ප්‍රායෝගික මධ්‍යස්ථානය" />
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Sidebar Tab Options */}
                            <div className="p-4 space-y-1 overflow-y-auto no-scrollbar md:max-h-[calc(100vh-220px)]">
                                {tabMeta.map((tab) => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 group text-left ${
                                            activeTab === tab.id
                                                ? "bg-brand-500/15 text-emerald-400 border border-brand-500/35 shadow-[inset_0_1px_1px_rgba(255,255,255,0.05)]"
                                                : "text-slate-400 hover:text-slate-100 hover:bg-slate-900/60"
                                        }`}
                                    >
                                        <div className={`transition-transform duration-200 group-hover:scale-110 ${activeTab === tab.id ? "text-emerald-400" : "text-slate-400"}`}>
                                            {tab.icon}
                                        </div>
                                        <div className="text-xs font-semibold">
                                            <Bilingual en={tab.label_en} si={tab.label_si} />
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Print Control Option at Sidebar Bottom */}
                        <div className="p-4 border-t border-slate-800/60 bg-slate-950/40">
                            <button
                                onClick={() => window.print()}
                                className="w-full flex items-center justify-center space-x-2 px-4 py-3 rounded-xl bg-slate-900 hover:bg-slate-850 text-slate-300 hover:text-white border border-slate-800 hover:border-slate-700 transition-all duration-200"
                            >
                                <IconPrint />
                                <span className="text-xs font-bold font-sans">
                                    <Bilingual en="Export / Print" si="ප්‍රකාශනය මුද්‍රණය කරන්න" />
                                </span>
                            </button>
                        </div>
                    </nav>

                    {/* MAIN WORKING CANVAS */}
                    <main className="flex-1 flex flex-col min-w-0">
                        
                        {/* STICKY TOP HEADER WITH 100% LANGUAGE TOGGLE */}
                        <header className="no-print sticky top-0 glass-panel border-b border-slate-800/80 p-4 md:px-8 flex flex-col sm:flex-row items-center justify-between space-y-3 sm:space-y-0 z-30 shadow-md">
                            <div>
                                <div className="flex items-center space-x-2">
                                    <span className="inline-flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    <span className="text-xs tracking-widest text-slate-400 font-bold uppercase font-sans">
                                        <Bilingual en="Bilingual Practicum System" si="ද්විභාෂා ප්‍රායෝගික පද්ධතිය" />
                                    </span>
                                </div>
                                <h2 className="text-lg font-bold text-white mt-0.5">
                                    <Bilingual en="Module 6: Product & Pricing Strategies" si="මොඩියුලය 6: භාණ්ඩ සහ මිලකරණ උපායමාර්ග" />
                                </h2>
                            </div>

                            {/* Strictly 100% Toggle with no dual language options */}
                            <div className="flex bg-slate-900/90 border border-slate-800 p-1.5 rounded-2xl relative shadow-inner">
                                <button
                                    onClick={() => setLangMode('en')}
                                    className={`px-4 py-1.5 rounded-xl text-xs font-bold transition-all duration-150 ${
                                        langMode === 'en' ? 'bg-brand-500 text-slate-950 shadow-md font-sans' : 'text-slate-400 hover:text-slate-200'
                                    }`}
                                >
                                    English
                                </button>
                                <button
                                    onClick={() => setLangMode('si')}
                                    className={`px-4 py-1.5 rounded-xl text-xs font-bold font-sinhala transition-all duration-150 ${
                                        langMode === 'si' ? 'bg-brand-500 text-slate-950 shadow-md' : 'text-slate-400 hover:text-slate-200'
                                    }`}
                                >
                                    සිංහල
                                </button>
                            </div>
                        </header>

                        {/* WORKSPACE AREA */}
                        <div className="p-4 md:p-8 active-tab-container relative">
                            
                            {/* TAB 0: CASE INSIGHT */}
                            {activeTab === 0 && (
                                <div className="space-y-6">
                                    {/* Intro Banner */}
                                    <div className="glass-panel p-6 rounded-3xl border-l-4 border-emerald-500">
                                        <h3 className="text-xl font-extrabold text-white">
                                            <Bilingual en="🌐 Case Insight: The Ceylon Organic Tea Export Paradigm" si="🌐 සිද්ධි විග්‍රහය: ලංකා කාබනික තේ අපනයන ආකෘතිය" />
                                        </h3>
                                        <p className="text-sm text-slate-400 mt-2 leading-relaxed">
                                            <Bilingual 
                                                en="Synthesizing the strategic core transition from bulk, highly elastic commodity exports into inelastic augmented premium products."

                                                bp_si: "බ්ලොක්චේන් තාක්ෂණය හරහා වගා තොරතුරු සොයා ගැනීමේ QR කේත භාවිතය, දේශීය ලී කැටයම් පෙට්ටි භාවිතය, කාබන් සන්තුලන සහතිකකරණය සහ විශේෂ පාරිභෝගික සමාජ සේවා සැපයීම."
                                            },
                                            {
                                                q_en: "2. If a firm establishes demand elasticity as |Ed| = 0.45, and increases prices by 25%, what are the immediate revenue gains vs. long-term risks?",
                                                q_si: "2. ආයතනයක මිල නම්‍යතාවය |Ed| = 0.45 ලෙස ගණනය කර ඇති විට ඔවුන් මිල 25% කින් වැඩි කළහොත් ලැබෙන ආදායම සහ ඇතිවන දිගුකාලීන අවදානම් මොනවාද?",
                                                bp_en: "Short-term: Revenue expands because demand change is fractional. Long-term risks: Invites lower-price clone products, alienates brand loyalists, and decreases barrier to entry.",

                                            },
                                            {
                                                q_en: "3. What are the severe psychological brand risks of over-relying on promotional discounts to drive short-term sales volume?",
                                                q_si: "3. ප්‍රිමියම් සන්නාමයක් නිරන්තරයෙන් වට්ටම් (Discounts) ලබා දීම මත පමණක් පඳනම් පැවතීමෙන් ඇතිවන මනෝවිද්‍යාත්මක සහ සන්නාම අවදානම් මොනවාද?",
                                                bp_en: "Permanently resets consumer reference price anchors. The brand status-symbol collapses, shifting target groups from premium value-seekers to deal-seekers.",
                                                bp_si: "පාරිභෝගිකයාගේ සිතේ ඇති ගුණාත්මක ප්‍රතිරූපය විනාශ වේ. වට්ටම් සහිත මිල සැබෑ මිල ලෙස පාරිභෝගිකයා සලකන අතර, සන්නාමයේ වාරික වටිනාකම නැති වී මිලට පමණක් සංවේදී අය පමණක් ඉතිරි වේ."
                                            },
                                            {
                                                q_en: "4. Why do highly prospective agricultural IoT systems fail to bridge the chasm between Early Adopters and the pragmatic Early Majority?",
                                                q_si: "4. කෘෂිකාර්මික ස්මාර්ට් උපාංග හෝ හරිත බලශක්ති විසඳුම් බොහෝමයක් 'Early Adopters' ගෙන් 'Early Majority' වෙත පැමිණීමේදී අසාර්ථක වන්නේ ඇයි?",
                                                bp_en: "Early Adopters absorb installation difficulties for novelty. The pragmatic majority requires zero assembly issues, robust warranty schemes, and on-call regional support centers.",
                                                bp_si: "මුල් කාලීනයන් (Early Adopters) තාක්ෂණයට ඇති ආශාවට මිලදී ගත්තත්, ප්‍රායෝගික බහුතරය (Early Majority) බලාපොරොත්තු වන්නේ අඛණ්ඩ සේවා සහය, පහසු ගෙවීමේ ක්‍රම සහ දෝෂ රහිත පූර්ණ නිෂ්පාදනයක් (Whole Product) වීමයි."
                                            },
                                            {

                                                q_si: "5. කුමන ආකාරයේ මෙහෙයුම් මුදල් ප්‍රවාහ (Cash flow) සහ වෙළඳපල තරඟකාරීත්ව තත්ත්ව යටතේදී මිල උරාගැනීම (Price Skimming) වෙළඳපල ආක්‍රමණයට වඩා උසස් වේද?",

                                                            <Bilingual en="▼ Reveal Blueprint" si="▼ මාර්ගෝපදේශය බලන්න" />

                                                {breakoutActive === idx && (
                                                    <div className="mt-4 pt-4 border-t border-slate-800/85 bg-slate-950/40 p-4 rounded-xl space-y-2" onClick={(e) => e.stopPropagation()}>
                                                        <span className="text-[10px] font-extrabold text-brand-400 uppercase tracking-widest block font-sans">
                                                            <Bilingual en="Facilitator's Blueprint Guide:" si="දේශකයාගේ මාර්ගෝපදේශය:" />
                                                        </span>
                                                        <div className="text-xs text-slate-300 leading-relaxed space-y-2">
                                                            <Bilingual en={item.bp_en} si={item.bp_si} />

                                                        <div className="mt-3 flex items-center space-x-2">

                                                            </label>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </div>

                        {/* GLOBAL BOTTOM PRACTICUM STATS HEADER */}
                        <footer className="no-print mt-auto glass-panel border-t border-slate-800/80 p-4 text-center text-xs text-slate-500">
                            <div>
                                <Bilingual en="OBISL Campus • Ocean Bridge International • Product & Pricing Practicum Hub" si="OBISL පරිශ්‍රය • ඕෂන් බ්‍රිජ් ඉන්ටර්නැෂනල් • භාණ්ඩ සහ මිලකරණ උපායමාර්ග ප්‍රායෝගික කේන්ද්‍රය" />
                            </div>
                        </footer>

                    </main>
                </div>
            );
        }

        // Initialize React Application via ReactDOM.createRoot
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
